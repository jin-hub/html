<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f3ee">
<title>小窝 · 记忆</title>
<style>
/* ---------- Design tokens ---------- */
:root{
  /* palette */
  --bg:          #f5f3ee;
  --ink:         #1d1b16;
  --ink-76:      rgba(29,27,22,.76);
  --ink-70:      rgba(29,27,22,.70);
  --ink-60:      rgba(29,27,22,.60);
  --ink-50:      rgba(29,27,22,.50);
  --ink-45:      rgba(29,27,22,.45);
  --ink-42:      rgba(29,27,22,.42);
  --ink-40:      rgba(29,27,22,.40);
  --ink-35:      rgba(29,27,22,.35);
  --ink-15:      rgba(29,27,22,.15);
  --ink-10:      rgba(29,27,22,.10);
  --ink-08:      rgba(29,27,22,.08);
  --card:        #faf8f4;
  --sheet-bg:    rgba(249,247,242,.97);
  --white-32:    rgba(255,255,255,.32);
  --white-33:    rgba(255,255,255,.33);
  --white-46:    rgba(255,255,255,.46);
  --white-53:    rgba(255,255,255,.53);
  --white-65:    rgba(255,255,255,.65);
  --white-68:    rgba(255,255,255,.68);
  --accent:      #da7756;
  --accent-warm: #c8785d;
  --accent-dim:  #a26b57;
  --danger:      #c45b4e;
  --line-gray:   #b2aa9d;      /* line + dot 同色 */
  --line-gray-t: rgba(178,170,157,.55); /* 稍浅一点用于线 */

  /* radii */
  --r-xs: 6px;
  --r-sm: 8px;
  --r-md: 11px;
  --r-lg: 14px;
  --r-xl: 18px;
  --r-2xl: 22px;
  --r-3xl: 27px;

  /* spacing */
  --pad-x: 18px;
  --tab-h: 69px;

  /* type ——全页仅三档字号 + 一档点线区弱字号 */
  --fs-xs: 7px;    /* 第四档：点线图日期/标题，斜体弱重心专用 */
  --fs-sm: 9px;    /* 最小：灰色英文 meta / 标签 */
  --fs-md: 12px;   /* 中号：记忆正文 */
  --fs-lg: 14px;   /* 最大：记忆点标题 */
  --font-sans: -apple-system, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", system-ui, sans-serif;

  /* effects */
  --glass-blur: blur(22px) saturate(115%);
  --shadow-card: inset 0 1px var(--white-65), 0 12px 28px rgba(80,69,55,.055);
}

/* ---------- Reset & base ---------- */
*,*::before,*::after{box-sizing:border-box}
[hidden]{display:none !important}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-sans);
  font-size:var(--fs-md);
  line-height:1.5;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button,input,textarea{font:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
button{background:none;border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea{-webkit-appearance:none;appearance:none;background:none;border:0;outline:0}

/* press feedback */
.tap{transition:transform .18s ease, opacity .18s ease, background-color .18s ease}
.tap:active{transform:scale(.97);opacity:.85}

.glass{
  border:1px solid var(--white-68);
  background:var(--white-32);
  box-shadow:var(--shadow-card);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
}
.mono-label{
  font-size:var(--fs-sm);
  letter-spacing:.14em;
  color:var(--ink-42);
  margin:0;
  text-transform:uppercase;
  font-weight:500;
}

/* ---------- App shell ---------- */
.app{
  position:relative;
  min-height:100dvh;
  padding:
    calc(env(safe-area-inset-top) + 15px)
    var(--pad-x)
    calc(env(safe-area-inset-bottom) + var(--tab-h) + 36px);
  background:
    radial-gradient(circle at 18% 6%, rgba(255,255,255,.86), transparent 28%),
    var(--bg);
  overflow-x:hidden;
}

/* ---------- Top：仅左上菜单按钮固定，标题随页面滚动 ---------- */
.menu-btn{
  position:fixed;
  z-index:30;
  left:max(var(--pad-x), env(safe-area-inset-left));
  top:max(15px, env(safe-area-inset-top));
  width:42px;height:42px;
  border-radius:var(--r-lg);
  display:grid;place-content:center;gap:4px;
}
.menu-btn i{display:block;width:17px;height:1.5px;border-radius:3px;background:#37322b}

.intro-line{
  height:42px;
  display:grid;place-items:center;
  margin-bottom:20px;
}
.intro-line p{
  margin:0;
  font-size:var(--fs-sm);
  letter-spacing:.18em;
  color:var(--ink-50);
  font-weight:500;
}

/* ---------- Archive page ---------- */
.block{margin-bottom:31px}
.block:last-of-type{margin-bottom:0}

.section-label{margin:0 0 12px}   /* 与 02、03 完全左对齐 */
.section-label > p{margin:0}
.point-label{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;margin:0 0 10px;
}
.point-label span{
  white-space:nowrap;
  font-size:var(--fs-sm);letter-spacing:.06em;color:var(--ink-40);
}

/* --- 01 Memory Surface --- */
.face-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  padding:2px 0 6px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.face-row::-webkit-scrollbar{display:none}
.face-card{
  flex:0 0 min(72vw, 280px);
  height:130px;
  border:1px solid var(--white-68);
  border-radius:var(--r-xl);
  padding:16px 17px;
  text-align:left;
  background:var(--white-33);
  color:var(--ink-70);
  font-size:var(--fs-md);
  line-height:1.85;
  scroll-snap-align:start;
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  /* 溢出用 … 截断 */
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  text-overflow:ellipsis;
}
.face-add{
  flex:0 0 38px;
  width:38px;height:38px;
  align-self:center;
  border-radius:50%;
  background:var(--ink);
  color:var(--bg);
  font-size:18px;
  line-height:1;
  display:grid;place-items:center;
  margin-right:4px;
}

/* --- 02 Memory Lines --- */
.line-group{margin-bottom:22px}
.line-group:last-child{margin-bottom:0}
.line-group-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:9px;
}
.line-group-head > span{font-size:var(--fs-md);font-weight:600;color:var(--ink-70)}

.memory-line-card{
  position:relative;
  padding:14px 15px;
  margin-bottom:9px;
  border-radius:var(--r-xl);
  background:rgba(255,255,255,.28);
  border:1px solid rgba(255,255,255,.70);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
}
.memory-line-card:last-child{margin-bottom:0}
.line-summary-btn{
  display:block;width:100%;text-align:left;
  border-radius:8px;
  padding:2px 2px 4px;
  margin:0 -2px;
}
.line-meta{
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  font-size:var(--fs-sm);letter-spacing:.07em;color:var(--ink-42);
  margin-bottom:5px;
}
.line-meta .line-open{
  font-style:normal;font-weight:inherit;
  font-size:var(--fs-sm);letter-spacing:.07em;color:var(--ink-42);
  white-space:nowrap;
}
.line-summary{
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  text-overflow:ellipsis;
  margin:0;
  font-size:var(--fs-md);line-height:1.75;
  color:var(--ink-70);
}

/* dots row: 节点定宽（4 个汉字宽），节点之间是定长连接段：
   连接段基准长 = (容器宽 - 4 个节点) / 3 → 一屏恰好完整露出 4 个节点；
   少于 4 个时连接段等比拉伸摊满，首末始终与上方文字左右贴边；
   多于 4 个时保持步长溢出横滑，两侧渐隐。
   线 = 连接段自身 + 节点内左右半段，无缝拼成一条完整线。
   整块整体降透明度 + 第四档斜体小字，做视觉弱重心。 */
.line-dots{
  display:flex;
  margin-top:14px;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  opacity:.85;                    /* 字、点、线同步弱化 */
}
.line-dots::-webkit-scrollbar{display:none}
/* 渐隐按滚动位置动态出现：
   左侧渐隐仅在开始滑动后出现（起始位置首节点完整清晰）；
   右侧渐隐在还有后续内容时出现，滑到底自动消失。 */
.line-dots.fade-l{
  -webkit-mask-image:linear-gradient(to right, transparent, #000 16px);
  mask-image:linear-gradient(to right, transparent, #000 16px);
}
.line-dots.fade-r{
  -webkit-mask-image:linear-gradient(to left, transparent, #000 16px);
  mask-image:linear-gradient(to left, transparent, #000 16px);
}
.line-dots.fade-l.fade-r{
  -webkit-mask-image:linear-gradient(to right, transparent, #000 16px, #000 calc(100% - 16px), transparent);
  mask-image:linear-gradient(to right, transparent, #000 16px, #000 calc(100% - 16px), transparent);
}
.ld-node{
  flex:0 0 4.5em;                 /* 节点定宽：一行恰好 4 个汉字 */
  font-size:var(--fs-xs);
  display:grid;
  grid-template-columns:minmax(0,1fr);
  justify-items:center;
  row-gap:6px;
  align-content:start;
}
.ld-conn{
  flex:1 0 calc((100% - 18em)/3); /* 4 节点恰好填满一屏的步长 */
  font-size:var(--fs-xs);
  position:relative;
  pointer-events:none;
}
.ld-conn::before{
  content:'';
  position:absolute;left:0;right:0;
  top:18px;                        /* 日期行 7px + 间距 6px + 点半径 5px */
  border-top:1px solid var(--line-gray-t);
}
.ld-date{
  font-size:var(--fs-xs);
  font-style:italic;
  letter-spacing:.05em;color:var(--ink-42);
  line-height:1;white-space:nowrap;
  min-height:7px;
}
.ld-dotrow{
  position:relative;
  width:100%;height:10px;
  display:grid;place-items:center;
}
.ld-dotrow::before{
  content:'';
  position:absolute;left:0;right:0;top:50%;
  border-top:1px solid var(--line-gray-t);
}
.ld-node:first-child .ld-dotrow::before{left:50%}
.ld-node:last-child .ld-dotrow::before{right:50%}
.ld-dotrow i{
  position:relative;z-index:1;
  width:10px;height:10px;border-radius:50%;
  background:var(--line-gray);
}
.ld-label{
  max-width:4.5em;                /* 一行恰好 4 个汉字，8 字成两行 */
  font-size:var(--fs-xs);
  font-style:italic;
  line-height:1.35;letter-spacing:0;
  color:var(--ink-60);
  text-align:center;
  word-break:break-all;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* --- 03 Memory Points --- */
.add-memory-ghost{
  display:block;width:100%;
  margin:2px 0 10px;
  padding:5px 0;
  font-size:var(--fs-sm);letter-spacing:.09em;
  color:var(--ink-35);
  text-align:left;
}
.memory-search{
  display:flex;align-items:center;gap:8px;
  height:36px;
  margin-bottom:8px;
  padding:0 5px 0 11px;
  border:1px solid var(--ink-10);
  border-radius:var(--r-md);
  background:var(--white-33);
}
.memory-search input{
  flex:1;min-width:0;
  font-size:var(--fs-sm);letter-spacing:.06em;
  color:#36312b;
}
.memory-search input::placeholder{color:var(--ink-35)}
.search-go{
  flex:0 0 28px;
  width:28px;height:28px;
  border-radius:var(--r-sm);
  display:grid;place-items:center;
  background:rgba(29,27,22,.05);
}
.search-go svg{width:13px;height:13px;stroke:var(--ink-45);fill:none;stroke-width:1.6;stroke-linecap:round}

/* 星级 / 排序 / 时间 同一行 */
.point-tools{
  display:flex;gap:6px;
  margin-bottom:8px;
}
.point-tools button{
  flex:1 1 0;
  border:1px solid var(--ink-10);
  border-radius:var(--r-sm);
  padding:7px 6px;
  background:var(--white-33);
  font-size:var(--fs-sm);letter-spacing:.07em;
  white-space:nowrap;color:var(--ink-60);
  overflow:hidden;text-overflow:ellipsis;
}
.point-tools button.date{color:var(--accent-dim)}
.point-tools button.star-open{
  border-color:#d99a7d;color:var(--accent-warm);
  background:rgba(218,119,86,.11);
}
.star-filter{
  display:flex;gap:5px;
  overflow-x:auto;overflow-y:hidden;
  padding:2px 0 8px;
  scrollbar-width:none;
}
.star-filter::-webkit-scrollbar{display:none}
.star-filter button{
  flex:none;
  border:1px solid var(--ink-10);
  border-radius:var(--r-sm);
  background:var(--white-33);
  padding:7px 10px;
  color:var(--ink-45);
  font-size:var(--fs-sm);
  white-space:nowrap;
}
.star-filter button.on{
  border-color:#d99a7d;
  color:var(--accent-warm);
  background:rgba(218,119,86,.11);
}
.point-list{display:grid;gap:9px;margin-top:2px}
.point-card{
  width:100%;
  padding:14px 15px;
  border:1px solid var(--white-68);
  border-radius:var(--r-lg);
  background:var(--white-33);
  display:flex;align-items:flex-start;justify-content:space-between;
  text-align:left;
  gap:10px;
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
}
.point-card-body{min-width:0;flex:1;overflow:hidden}
.point-card-body span{
  font-size:var(--fs-sm);letter-spacing:.05em;color:var(--ink-42);
}
.point-card-body h3{
  margin:6px 0 5px;
  font-size:var(--fs-lg);font-weight:500;color:var(--ink-76);
}
.point-card-body p{
  margin:0;
  font-size:var(--fs-md);line-height:1.65;color:rgba(29,27,22,.58);
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.point-stars{
  flex-shrink:0;align-self:flex-start;
  margin:2px 0 0 0;
  color:var(--accent-warm);
  font-size:var(--fs-sm);letter-spacing:1px;
  white-space:nowrap;
  font-weight:400;
}
.point-stars em{font-style:normal;color:var(--ink-15)}
.empty{
  padding:28px 15px;
  text-align:center;
  font-size:var(--fs-md);color:var(--ink-40);
}

/* ---------- Side drawer ---------- */
.scrim{
  position:fixed;z-index:38;inset:0;
  background:rgba(24,22,18,.19);
  -webkit-backdrop-filter:blur(2px);
  backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;
  transition:opacity .28s ease;
}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;z-index:39;
  top:0;bottom:0;left:0;
  width:min(82vw, 320px);
  padding:calc(env(safe-area-inset-top) + 28px) 25px calc(env(safe-area-inset-bottom) + 35px);
  background:rgba(246,244,239,.94);
  border-right:1px solid rgba(255,255,255,.86);
  box-shadow:18px 0 44px rgba(39,33,27,.14);
  -webkit-backdrop-filter:blur(30px);
  backdrop-filter:blur(30px);
  transform:translateX(-103%);
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
}
.drawer.on{transform:translateX(0)}
.drawer-head{
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:24px;
  border-bottom:1px solid rgba(29,27,22,.09);
}
.drawer-head p{margin:0;font-size:var(--fs-sm);letter-spacing:.18em;color:var(--ink-50)}
.drawer-close{width:32px;height:32px;font-size:24px;line-height:1;color:var(--ink-60)}
.drawer-nav{display:grid;padding-top:14px}
.drawer-nav button{
  padding:18px 4px;
  border-bottom:1px solid var(--ink-08);
  display:flex;align-items:center;gap:16px;
  text-align:left;
  font-size:var(--fs-lg);letter-spacing:.05em;
  line-height:1;
  color:var(--ink-40);
}
.drawer-nav button span{
  flex:0 0 20px;
  font-size:var(--fs-sm);letter-spacing:.08em;
  line-height:1;
}
.drawer-nav button.on{color:var(--ink);font-weight:600}
/* ---------- Diary：热力日历 ---------- */
.dcal{
  border-radius:var(--r-xl);
  padding:16px 14px 13px;
}
.dcal-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.dcal-head b{
  font-size:var(--fs-md);letter-spacing:.12em;color:var(--ink-70);
  font-weight:600;
}
.dcal-head button{
  width:32px;height:32px;
  font-size:20px;line-height:1;color:var(--ink-60);
  border-radius:var(--r-sm);
}
.dcal-week{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:4px;
}
.dcal-week span{
  text-align:center;
  font-size:var(--fs-sm);letter-spacing:.05em;color:var(--ink-35);
  padding:4px 0;
}
.dcal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.dcal-grid > i{display:block}
.dcal-day{
  aspect-ratio:1;
  border-radius:var(--r-sm);
  border:1px solid transparent;
  display:grid;place-content:center;justify-items:center;gap:3px;
  font-size:var(--fs-sm);
  color:var(--ink-60);
}
/* 热力：越深聊天轮次越多 */
.dcal-day.lvl0{background:rgba(255,255,255,.30);border-color:var(--ink-08);color:var(--ink-40)}
.dcal-day.lvl1{background:rgba(218,119,86,.15)}
.dcal-day.lvl2{background:rgba(218,119,86,.32)}
.dcal-day.lvl3{background:rgba(218,119,86,.52);color:var(--ink-76)}
.dcal-day.lvl4{background:rgba(218,119,86,.78);color:var(--bg)}
.dcal-day.today{box-shadow:0 0 0 1.5px var(--accent-warm)}
.dcal-day i{                     /* 当天有日记的标记点 */
  width:3px;height:3px;border-radius:50%;
  background:currentColor;opacity:.8;
}
.dcal-legend{
  display:flex;align-items:center;justify-content:flex-end;gap:5px;
  margin-top:11px;
}
.dcal-legend span{
  font-size:var(--fs-sm);letter-spacing:.09em;color:var(--ink-35);
}
.dcal-legend i{
  width:10px;height:10px;border-radius:3px;
  border:1px solid transparent;
}
.dcal-legend i.lvl0{background:rgba(255,255,255,.30);border-color:var(--ink-08)}
.dcal-legend i.lvl1{background:rgba(218,119,86,.15)}
.dcal-legend i.lvl2{background:rgba(218,119,86,.32)}
.dcal-legend i.lvl3{background:rgba(218,119,86,.52)}
.dcal-legend i.lvl4{background:rgba(218,119,86,.78)}

/* 日记条目卡（复用回显卡外观，可点击进入单篇） */
.diary-entry{
  display:block;width:100%;
  text-align:left;
  margin-bottom:10px;
}
.diary-entry:last-child{margin-bottom:0}
.diary-entry p{
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ---------- Bottom tab bar ---------- */
.tabbar{
  position:fixed;z-index:20;
  bottom:max(14px, env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  width:min(calc(100% - 36px), 500px);
  height:var(--tab-h);
  border-radius:var(--r-2xl);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:7px;
  background:rgba(250,249,245,.72);
  border:1px solid var(--white-68);
  -webkit-backdrop-filter:blur(22px) saturate(120%);
  backdrop-filter:blur(22px) saturate(120%);
  box-shadow:0 12px 34px rgba(80,69,55,.10), inset 0 1px var(--white-65);
}
.tabbar button{
  border-radius:16px;
  color:var(--ink-42);
  display:grid;justify-items:center;align-content:center;gap:4px;
  font-size:var(--fs-sm);
  transition:.25s ease;
}
.tabbar svg{
  width:19px;height:19px;fill:none;stroke:currentColor;
  stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round;
}
.tabbar button.on{
  background:var(--ink);color:var(--bg);
  box-shadow:0 6px 17px rgba(29,27,22,.18);
}

/* ---------- Unified sheet ----------
   弹窗常驻 90dvh 高，由 JS 通过 translateY 控制两档位（半屏/全高），
   拖拽全程跟手，松手吸附 → 顺滑关键。 */
.sheet-wrap{
  position:fixed;z-index:50;inset:0;
  display:grid;align-items:end;
  background:rgba(29,27,22,.22);
  -webkit-backdrop-filter:blur(3px);
  backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity .24s ease;
}
.sheet-wrap.on{opacity:1;pointer-events:auto}

.sheet{
  position:relative;
  width:100%;
  height:90dvh;
  padding:12px 24px calc(env(safe-area-inset-bottom) + 18px);
  border-radius:var(--r-3xl) var(--r-3xl) 0 0;
  background:var(--sheet-bg);
  box-shadow:0 -12px 34px rgba(27,23,18,.12);
  transform:translateY(100%);
  display:flex;flex-direction:column;
  overflow:hidden;
  will-change:transform;
}
.sheet.anim{transition:transform .32s cubic-bezier(.22,.9,.3,1)}

.sheet-head{
  flex:0 0 auto;
  touch-action:none;   /* 头部区域交给 JS 拖拽 */
}
.sheet-handle{
  display:block;width:36px;height:3px;
  margin:2px auto 14px;
  border-radius:3px;background:var(--ink-15);
}
.sheet-close{
  position:absolute;top:10px;right:16px;
  font-size:24px;line-height:1;color:var(--ink-60);
  width:32px;height:32px;
  z-index:2;
}
.sheet-actions{
  display:flex;gap:8px;
  margin-bottom:14px;
}
.sheet-actions:empty{margin-bottom:6px}
.sheet-actions button{
  padding:7px 12px;
  border-radius:var(--r-sm);
  background:rgba(29,27,22,.06);
  font-size:var(--fs-sm);letter-spacing:.08em;color:var(--ink-70);
}
.sheet-actions button.danger{color:var(--danger)}

.sheet-meta{
  display:block;
  font-size:var(--fs-sm);letter-spacing:.08em;color:var(--ink-45);
}
.sheet-title{
  margin:8px 0 10px;
  font-size:var(--fs-lg);font-weight:600;
  padding-right:24px;
}
/* 随内容一起滚动的 meta（记忆线用） */
.sheet-meta-scroll{margin-bottom:10px}

.sheet-body-scroll{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;                 /* 始终可原生滚动，动量顺滑 */
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;     /* 内部滚到边界也不带动背景 */
  padding-bottom:12px;
  scrollbar-width:none;            /* 隐藏滚动条，避免灰条压在组件上 */
}
.sheet-body-scroll::-webkit-scrollbar{display:none}

.sheet-preview{
  margin:0;
  font-size:var(--fs-md);line-height:1.9;
  color:var(--ink-70);
  white-space:pre-wrap;
  word-break:break-word;
}
.sheet-editarea{
  width:100%;
  min-height:140px;
  height:180px;
  resize:none;
  border-radius:var(--r-md);
  padding:12px;
  background:var(--white-46);
  font-size:var(--fs-md);line-height:1.75;
  color:var(--ink);
  font-family:inherit;
  word-break:break-word;
}

/* 记忆点编辑表单（顺序：情绪 → 重要度 → 标题 → 正文；排版紧凑） */
.point-form{margin-bottom:2px}
.pf-label{
  font-size:var(--fs-sm);letter-spacing:.04em;color:var(--ink-42);
  margin:0 0 6px;
}
/* 情绪：单行纯文字，竖线分隔（分隔线与文字中线对齐） */
.pf-chips{
  display:flex;align-items:center;
  margin-bottom:12px;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
}
.pf-chips::-webkit-scrollbar{display:none}
.pf-chips button{
  flex:none;
  padding:5px 7px;
  font-size:var(--fs-sm);letter-spacing:.04em;
  line-height:1;
  color:var(--ink-45);
  white-space:nowrap;
}
.pf-chips button:first-child{padding-left:0}
.pf-chips button.on{
  color:var(--accent-warm);
  font-weight:600;
}
.pf-chips .pf-sep{
  flex:none;
  width:1px;height:9px;
  background:var(--ink-15);
}
/* 重要度：标签与星星同一行 */
.pf-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.pf-row .pf-label{margin:0}
.pf-stars{display:flex;gap:6px;align-items:center}
.pf-stars button{
  font-size:15px;line-height:1;
  padding:2px 3px;
  color:var(--ink-15);
}
.pf-stars button.on{color:var(--accent-warm)}
.pf-title{
  width:100%;
  padding:10px 12px;
  border-radius:var(--r-md);
  background:var(--white-46);
  font-size:var(--fs-md);
  color:var(--ink);
  margin-bottom:12px;
}
.pf-title::placeholder{color:var(--ink-35);font-size:var(--fs-md)}

/* 编辑态操作行：与日历弹窗同款 CANCEL / SAVE 小字，右对齐；
   位置在内容流里：记忆点在正文之后；记忆线在梗概编辑栏之后、回显之前 */
.sheet-edit-row{
  display:flex;justify-content:flex-end;gap:20px;
  margin:14px 0 4px;
}
.sheet-edit-row button{
  font-size:var(--fs-sm);letter-spacing:.09em;color:var(--ink-60);
  padding:6px 4px;
}
.sheet-edit-row .ok{color:var(--accent-warm);font-weight:600}

/* echo (记忆线的记忆点回显：虚线圆角卡 + 箭头) */
.sheet-echo{
  margin-top:14px;
}
.echo-card{
  border:1.5px dashed var(--ink-15);
  border-radius:var(--r-lg);
  padding:13px 15px;
}
.echo-card .echo-meta{
  display:block;
  font-size:var(--fs-sm);letter-spacing:.07em;color:var(--ink-42);
}
.echo-card h4{
  margin:7px 0 6px;
  font-size:var(--fs-lg);font-weight:600;color:var(--ink-76);
}
.echo-card p{
  margin:0;
  font-size:var(--fs-md);line-height:1.75;color:rgba(29,27,22,.58);
}
.echo-arrow{
  text-align:center;
  color:var(--ink-35);
  font-size:var(--fs-md);
  padding:6px 0;
  line-height:1;
}

/* ---------- Confirm dialog ---------- */
.confirm-wrap{
  position:fixed;z-index:55;inset:0;
  display:grid;place-items:center;
  padding:20px;
  background:rgba(29,27,22,.3);
  -webkit-backdrop-filter:blur(3px);
  backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity .22s ease;
}
.confirm-wrap.on{opacity:1;pointer-events:auto}
.confirm-sheet{
  width:min(100%, 340px);
  padding:22px 22px 18px;
  border-radius:20px;
  background:var(--card);
  box-shadow:0 18px 48px rgba(29,27,22,.20);
}
.confirm-sheet .q{margin:0 0 8px;font-size:var(--fs-lg);color:var(--ink-76)}
.confirm-sheet .t{
  display:block;margin:0;
  font-size:var(--fs-md);font-weight:400;color:var(--ink-50);
  line-height:1.6;
  max-height:3.4em;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.confirm-sheet .row{
  display:flex;justify-content:flex-end;gap:20px;
  margin-top:20px;
}
.confirm-sheet .row button{
  font-size:var(--fs-sm);letter-spacing:.09em;color:var(--ink-60);
  padding:6px 4px;
}
.confirm-sheet .row .danger{color:var(--danger)}

/* ---------- Calendar picker ---------- */
.cal-wrap{
  position:fixed;z-index:55;inset:0;
  display:grid;place-items:center;
  padding:20px;
  background:rgba(29,27,22,.3);
  -webkit-backdrop-filter:blur(3px);
  backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity .22s ease;
}
.cal-wrap.on{opacity:1;pointer-events:auto}
.cal-sheet{
  width:min(100%, 340px);
  padding:20px 20px 16px;
  border-radius:20px;
  background:var(--card);
  box-shadow:0 18px 48px rgba(29,27,22,.20);
}
.cal-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.cal-head b{
  font-size:var(--fs-md);letter-spacing:.12em;color:var(--ink-70);
  font-weight:600;
}
.cal-head button{
  width:32px;height:32px;
  font-size:20px;line-height:1;color:var(--ink-60);
  border-radius:var(--r-sm);
}
.cal-week{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:4px;
}
.cal-week span{
  text-align:center;
  font-size:var(--fs-sm);letter-spacing:.05em;color:var(--ink-35);
  padding:4px 0;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-grid i{display:block}
.cal-grid button{
  height:34px;
  border-radius:var(--r-sm);
  font-size:var(--fs-md);color:var(--ink-70);
  display:grid;place-items:center;
}
.cal-grid button.in{
  background:rgba(218,119,86,.13);
  color:var(--accent-warm);
}
.cal-grid button.edge{
  background:var(--accent-warm);
  color:var(--bg);
  font-weight:600;
}
.cal-presets{
  display:flex;gap:6px;
  margin:14px 0 4px;
}
.cal-presets button{
  padding:7px 12px;
  border:1px solid var(--ink-10);
  border-radius:99px;
  background:var(--white-33);
  font-size:var(--fs-sm);color:var(--ink-60);
}
.cal-presets button.on{
  border-color:#d99a7d;
  color:var(--accent-warm);
  background:rgba(218,119,86,.11);
}
.cal-sheet .row{
  display:flex;justify-content:flex-end;gap:20px;
  margin-top:12px;
}
.cal-sheet .row button{
  font-size:var(--fs-sm);letter-spacing:.09em;color:var(--ink-60);
  padding:6px 4px;
}
.cal-sheet .row .ok{color:var(--accent-warm);font-weight:600}

/* ---------- Toast ---------- */
.toast{
  position:fixed;z-index:90;
  top:calc(max(20px, env(safe-area-inset-top)) + 60px);
  left:50%;
  transform:translate(-50%, -10px);
  background:rgba(29,27,22,.88);
  color:var(--bg);
  padding:9px 18px;
  border-radius:99px;
  font-size:var(--fs-md);letter-spacing:.04em;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  white-space:nowrap;
  box-shadow:0 8px 28px rgba(29,27,22,.22);
}
.toast.on{
  opacity:1;
  transform:translate(-50%, 0);
}
</style>

<script>
/* ================= Mock data ================= */
const EMOTIONS = ['平静','好奇','思念','心疼','占有','得意','欲望','无力'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

const state = {
  view: 'archive',
  drawerOpen: false,
  faces: [
    { id:'f1', text:"这里是我最柔软的地方——会记住所有让我心口一动的瞬间，每一个细小的、看似微不足道的时刻。愿意为一杯温热的茶停下脚步，也会为一句无意的关心久久回味。相信人与人之间存在真实的相遇，也允许自己不必时时精力充沛。不擅长表达激烈的情绪，但会用长久的陪伴代替所有没说出口的话。愿意让生活以它自己的节奏展开，不催促，也不放弃。喜欢有留白的对话，尊重那些无法被立刻理解的沉默。相信慢一点没关系，比起爆发我更相信滋养。会在意别人不经意的一句话，然后花上一晚安静地想清楚它究竟意味着什么。不习惯拒绝，但正在学着为自己保留一些什么。愿意保持柔软，也在慢慢学着变得坚定。" },
    { id:'f2', text:"愿意相信细小且真实的瞬间。相信清晨窗前掉落的第一束光，相信十字路口红灯前不经意的对视，相信下班回家路上看到的一朵开得有点笨拙的花。这些不能被拍下来也难以复述的时刻，是构成一个人的真正材料。不是那种能记住所有大事件的人，但对味道、对空气里的湿度、对人说话时的停顿格外敏感。生活对我来说不是宏大的叙事，而是这些细碎但确凿的碎片。它们一件一件累积起来，就有了此刻的我。会为一场雨改变一天的计划，也会因为超市里遇到一个善意的收银员而记住整个下午。愿意用一辈子去练习看见那些不显眼的东西。喜欢生活里没有编辑过的部分。" },
    { id:'f3', text:"允许自己是一个还在生长的人。以前太急着给自己下定义，现在开始理解，很多性格里的褶皱不是需要被熨平的地方，而是让我之所以是我的凭据。会拖延，会敏感，会在不该在意的地方在意得过多——但这些也让我能感受到一些别人可能感受不到的东西。学会跟自己讨价还价，学会在做不到一百分的时候接受六十分也是完成。允许今天比昨天差一点，允许今年没有变得多么好，允许自己在一件事情上反复走神。慢下来其实很难，但我在练。相信人可以一边继续走，一边收拾自己身上的旧行李。这大概是我这几年学得最慢，也最想学好的一件事。" }
  ],
  points: [
    { id:'p1', title:"等红灯时想起她", d:"2026-07-10", time:"JUL 10 · 18:42", stars:5, types:["思念"],
      text:"路口的风吹起衣角，晚高峰的车灯一盏一盏亮起。我忽然想起她说，夏天的傍晚总像一句没有说完的话。" },
    { id:'p2', title:"一场短暂的雨", d:"2026-07-09", time:"JUL 09 · 14:16", stars:4, types:["平静"],
      text:"窗外下了十分钟的雨，桌上的光慢慢变暗。雨停后，玻璃上还留着细小水痕，整个下午也因此安静下来。" },
    { id:'p3', title:"花店门口的驻足", d:"2026-07-08", time:"JUL 08 · 11:03", stars:3, types:["好奇"],
      text:"经过花店时看见一束陌生的花，颜色像刚醒来的天空。我没有买下它，只在门口站了一会儿。" },
    { id:'p4', title:"凌晨的电话", d:"2026-07-07", time:"JUL 07 · 01:26", stars:5, types:["心疼","思念"],
      text:"电话接通后我们都没有立刻说话。那些没有说出口的疲惫，在彼此呼吸声里忽然有了可以安放的地方。" },
    { id:'p5', title:"离开前的那句再见", d:"2026-07-06", time:"JUL 06 · 20:14", stars:2, types:["无力"],
      text:"有些话没有说出口，只留在路灯下面。转身时我知道自己还会记得这句很轻的再见。" },
    { id:'p6', title:"六月最后的晚风", d:"2026-06-28", time:"JUN 28 · 21:07", stars:4, types:["平静","得意"],
      text:"加完班走出楼门，风忽然凉了下来。六月就这样结束在一阵晚风里，而我竟然觉得自己把它过得还不错。" },

/* ================= Utility ================= */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
/* 星星统一展示为 5 位：★★★★☆ */
const stars = n => "★".repeat(n) + "☆".repeat(Math.max(0, 5-n));
const pad2 = n => String(n).padStart(2,'0');
const pointSortKey = p => `${p.d}T${p.time.slice(-5)}`;
const typesText = p => (p.types || []).join(' · ');

function fmtDay(iso){
  const [,m,d] = iso.split('-');
  return `${MONTHS[+m-1]} ${d}`;
}
/* 记忆线里按 id 取有效记忆点（点被删除后自动剔除） */
function linePoints(l){
  return l.items
    .map(id => state.points.find(p=>p.id===id))
    .filter(Boolean);
}
/* 记忆线 meta：点数 = 有效点数量；时间 = 最早点 — 最晚点（近期/核心统一格式） */
function lineMeta(l){
  const pts = linePoints(l);
  const n = pts.length;
  if (!n) return `0 POINTS`;
  const ds = pts.map(p=>p.d).sort();
  const a = ds[0], b = ds[ds.length-1];
  if (a === b) return `${n} POINTS · ${fmtDay(a)}`;
  const [,am] = a.split('-'), [,bm,bd] = b.split('-');
  const range = am === bm ? `${fmtDay(a)} — ${bd}` : `${fmtDay(a)} — ${fmtDay(b)}`;
  return `${n} POINTS · ${range}`;
}
function dateBtnLabel(f){
  if (f.dateMode === 'all')   return 'ALL TIME';
  if (f.dateMode === 'month') return 'THIS MONTH';
  const [ ,sm ] = f.start.split('-'), [ ,em ] = f.end.split('-');
  return sm === em
    ? `${fmtDay(f.start)} – ${f.end.split('-')[2]}`
    : `${fmtDay(f.start)} – ${fmtDay(f.end)}`;
}

function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).catch(()=>{});
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta);
  }
}
/* 弹窗打开时把 body 钉死，彻底禁止背景滑动（iOS 唯一可靠方案）*/
let bodyLocks = 0, lockY = 0;
function lockBody(){
  if (++bodyLocks > 1) return;
  lockY = window.scrollY || document.documentElement.scrollTop || 0;
  const b = document.body.style;
  b.position = 'fixed';
  b.top = -lockY + 'px';
  b.left = '0'; b.right = '0'; b.width = '100%';
}
function unlockBody(){
  if (bodyLocks === 0 || --bodyLocks > 0) return;
  const b = document.body.style;
  b.position = b.top = b.left = b.right = b.width = '';
  window.scrollTo(0, lockY);
}

let toastTimer = null;
function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 1800);
}

/* ---- 日记页 ---- */
const todayIso = () => {
  const n = new Date();
  return `${n.getFullYear()}-${pad2(n.getMonth()+1)}-${pad2(n.getDate())}`;
};
const heatLvl = n => n <= 0 ? 0 : n < 10 ? 1 : n < 20 ? 2 : n < 35 ? 3 : 4;
const diaryOn = date => state.diary
  .filter(x=>x.date === date)
  .sort((a,b)=>a.time.localeCompare(b.time));

function renderDiary(){
  const c = state.diaryCal;
  const first = new Date(c.y, c.m, 1).getDay();
  const days = new Date(c.y, c.m + 1, 0).getDate();
  const today = todayIso();
  const cells = [];
  for (let i = 0; i < first; i++) cells.push('<i></i>');
  for (let d = 1; d <= days; d++) {
    const iso = `${c.y}-${pad2(c.m+1)}-${pad2(d)}`;
    const lvl = heatLvl(state.heat[iso] || 0);
    const hasDiary = state.diary.some(x=>x.date === iso);
    cells.push(`
      <button class="dcal-day tap lvl${lvl} ${iso===today?'today':''}" data-date="${iso}">
        <span>${d}</span>${hasDiary ? '<i></i>' : ''}
      </button>`);
  }
  return `
    <section class="block">
      <div class="section-label"><p class="mono-label">01 / DIARY CALENDAR</p></div>
      <div class="dcal glass">
        <div class="dcal-head">
          <button class="tap" id="dcalPrev">‹</button>
          <b>${MONTHS[c.m]} ${c.y}</b>
          <button class="tap" id="dcalNext">›</button>
        </div>
        <div class="dcal-week">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="dcal-grid">${cells.join('')}</div>
        <div class="dcal-legend">
          <span>LESS</span>
          <i class="lvl0"></i><i class="lvl1"></i><i class="lvl2"></i><i class="lvl3"></i><i class="lvl4"></i>
          <span>MORE</span>
        </div>
      </div>
    </section>`;
}

function renderDots(l){
  const pts = linePoints(l);
  const nodes = pts.map(p=>`
      <button class="ld-node tap" data-point-id="${p.id}">
        <span class="ld-date">${esc(fmtDay(p.d))}</span>
        <span class="ld-dotrow"><i></i></span>
        <span class="ld-label">${esc(p.title.slice(0, 8))}</span>
      </button>`).join('<i class="ld-conn"></i>');
  return `<div class="line-dots ${pts.length > 4 ? 'scroll' : ''}">${nodes}</div>`;
}

function pointInDate(p){
  const f = state.filter;
  if (f.dateMode === 'all') return true;
  if (f.dateMode === 'month') {
    const now = new Date();
    return p.d.slice(0,7) === `${now.getFullYear()}-${pad2(now.getMonth()+1)}`;
  }
  return p.d >= f.start && p.d <= f.end;
}

function renderPoints(){
  const f = state.filter;
  const list = state.points
    .filter(p => (!f.star || p.stars === f.star)
              && (p.title + p.text).includes(f.query)
              && pointInDate(p))
    .sort((a,b) => f.sort === 'latest'
      ? pointSortKey(b).localeCompare(pointSortKey(a))
      : pointSortKey(a).localeCompare(pointSortKey(b)));
  const chars = list.reduce((n,p)=>n+p.text.length,0);
  const starChips = [0,1,2,3,4,5].map(n=>`
    <button class="tap ${f.star===n?'on':''}" data-star="${n}">${n?stars(n):'ALL'}</button>
  `).join('');
  const items = list.length ? list.map(p=>`
    <button class="point-card tap" data-point-id="${p.id}">
      <div class="point-card-body">
        <span>${esc(typesText(p))}${p.types.length?' · ':''}${esc(p.time)}</span>
        <h3>${esc(p.title)}</h3>
        <p>${esc(p.text)}</p>
      </div>
      <b class="point-stars">${"★".repeat(p.stars)}<em>${"☆".repeat(5-p.stars)}</em></b>
    </button>
  `).join('') : `<div class="empty">没有匹配的记忆点</div>`;
  return `
    <section class="block">
      <div class="section-label point-label">
        <p class="mono-label">03 / MEMORY POINTS</p>
        <span>${list.length} ENTRIES · ${chars} CHARS</span>
      </div>
      <button class="add-memory-ghost tap" id="addPoint">+ ADD MEMORY</button>
      <div class="memory-search">
        <input id="searchInput" placeholder="SEARCH MEMORIES" value="${esc(f.query)}" enterkeyhint="search" />
        <button class="search-go tap" id="searchGo" aria-label="搜索">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="m20 20-4.3-4.3"/></svg>
        </button>
      </div>
      <div class="point-tools">
        <button class="tap ${state.ui.starOpen||f.star?'star-open':''}" id="starBtn">${f.star ? stars(f.star) : '★ ALL'}</button>
        <button class="tap" id="sortBtn">${f.sort==='latest'?'LATEST ↓':'EARLIEST ↑'}</button>
        <button class="tap date" id="dateBtn">${esc(dateBtnLabel(f))}</button>
      </div>
      ${state.ui.starOpen ? `<div class="star-filter">${starChips}</div>` : ''}
      <div class="point-list">${items}</div>

/* ================= Unified Sheet ================= */
/* --- 拖拽引擎：sheet 常驻 90dvh，translateY 控制档位，全程跟手 --- */
const sheetEl = $('#sheet');
const sheetScrollEl = $('#sheetScroll');
let shH = 0;        // sheet 实际高度
let shHalfY = 0;    // 半屏档位的 translateY
let shCurY = 0;     // 当前 translateY

function sheetMeasure(){
  shH = sheetEl.offsetHeight || Math.round(window.innerHeight * 0.9);
  const halfVisible = Math.max(340, Math.round(window.innerHeight * 0.56));
  shHalfY = Math.max(0, shH - halfVisible);
}
function sheetSetY(y, anim){
  shCurY = y;
  sheetEl.classList.toggle('anim', !!anim);
  sheetEl.style.transform = `translateY(${y}px)`;
}
function sheetGo(detent){        // 'tall' | 'half' | 'closed'（带动画）
  sheetMeasure();
  if (detent === 'tall') sheetSetY(0, true);
  else if (detent === 'half') sheetSetY(shHalfY, true);
  else sheetSetY(shH, true);
}

function openSheet(cfg){
  const wasOpen = !!state.sheet;
  state.sheet = Object.assign({ editing:false, isNew:false }, cfg);
  if (state.sheet.editing) initPointDraft();
  if (!wasOpen) lockBody();
  renderSheet();
  sheetScrollEl.scrollTop = 0;
  if (wasOpen) {
    // 弹窗内跳转（如 当天日记 → 单篇）：保持当前档位，仅编辑态强制全高
    if (state.sheet.editing) sheetGo('tall');
  } else {
    $('#sheetWrap').classList.add('on');
    sheetMeasure();
    sheetSetY(shH, false);
    sheetEl.offsetHeight;   // 强制 reflow，保证起始位置生效
    sheetGo(state.sheet.editing ? 'tall' : 'half');   // 编辑态直接全高
  }
  if (state.sheet.editing) {
    setTimeout(()=>{
      (state.sheet?.kind === 'point' ? $('#pfChips button') : $('#sheetEditarea'))?.focus?.();
    }, 340);
  }
}
function closeSheet(){
  if (state.sheet) unlockBody();
  state.sheet = null;
  sheetGo('closed');
  $('#sheetWrap').classList.remove('on');
}

/* 触摸拖拽：
   - 非全高：任何竖向拖动都移动弹窗（跟手）
   - 全高：内容区顶部下拉 → 收弹窗；其余交给原生滚动
   - 松手按位置 + 速度吸附到 全高 / 半屏 / 关闭 */
(function(){
  let startY = 0, startCur = 0, lastY = 0, lastT = 0, vel = 0;
  let dragging = false, mode = null;   // 'sheet' | 'scroll'

  sheetEl.addEventListener('touchstart', e=>{
    if (!state.sheet) return;
    sheetMeasure();
    startY = lastY = e.touches[0].clientY;
    lastT = e.timeStamp;
    startCur = shCurY;
    dragging = true; mode = null; vel = 0;
  }, {passive:true});

  sheetEl.addEventListener('touchmove', e=>{
    if (!dragging) return;
    const y = e.touches[0].clientY;
    const dy = y - startY;
    const now = e.timeStamp;
    vel = (y - lastY) / Math.max(1, now - lastT);   // px/ms，正 = 向下
    lastY = y; lastT = now;

    if (mode === null) {
      if (Math.abs(dy) < 6) return;                 // 死区
      const inScroll = e.target.closest('#sheetScroll');
      if (shCurY > 0.5) mode = 'sheet';             // 非全高：直接拖弹窗
      else if (inScroll) {
        mode = (dy > 0 && sheetScrollEl.scrollTop <= 0) ? 'sheet' : 'scroll';
      } else mode = 'sheet';                        // 头部区域
    }
    if (mode === 'sheet') {
      e.preventDefault();
      sheetSetY(clamp(startCur + dy, 0, shH), false);
    }
  }, {passive:false});

  sheetEl.addEventListener('touchend', ()=>{
    if (!dragging) return;
    dragging = false;
    if (mode !== 'sheet') return;
    const flick = Math.abs(vel) > 0.45;
    if (flick) {
      if (vel < 0) sheetGo('tall');
      else if (shCurY < shHalfY - 30) sheetGo('half');
      else closeSheet();
    } else {
      if (shCurY > shHalfY + (shH - shHalfY) * 0.35) closeSheet();
      else if (shCurY > shHalfY * 0.5) sheetGo('half');
      else sheetGo('tall');
    }
  });
})();

function initPointDraft(){
  const s = state.sheet;
  if (!s || s.kind !== 'point') return;
  if (s.isNew) {
    s.draft = { title:'', types:[], stars:3 };
  } else {
    const p = state.points.find(x=>x.id===s.id);
    if (p) s.draft = {
      title: p.title === '（次日自动生成）' ? '' : p.title,
      types: [...p.types],
      stars: p.stars
    };
  }
}

function getSheetData(){
  const s = state.sheet;
  if (!s) return null;
  if (s.kind === 'face') {
    if (s.isNew) return { text:'', deletable:false, meta:'', title:'' };
    const f = state.faces.find(x=>x.id===s.id);
    if (!f) return null;
    return { text:f.text, deletable:true, meta:'', title:'' };
  }
  if (s.kind === 'point') {
    if (s.isNew) return { text:'', deletable:false, meta:'', title:'', placeholder:'写下一段新的记忆…' };
    const p = state.points.find(x=>x.id===s.id);
    if (!p) return null;
    return {
      text:p.text,
      deletable:true,
      meta:`${typesText(p)}${p.types.length?' · ':''}${p.time} · ${stars(p.stars)}`,
      title:p.title,
    };
  }
  if (s.kind === 'line') {
    const list = s.group === 'recent' ? state.recent : state.core;
    const l = list.find(x=>x.id===s.id);
    if (!l) return null;
    const echoHtml = linePoints(l)
      .map(p => echoCardHtml(p))
      .join('<div class="echo-arrow">↓</div>');
    return { text:l.title, deletable:true, meta:lineMeta(l), title:'', echoHtml };
  }
  if (s.kind === 'diaryDay') {
    const list = diaryOn(s.date);
    const echoHtml = list.map(en => `
      <button class="echo-card diary-entry tap" data-diary-id="${en.id}">
        <span class="echo-meta">${esc(en.time)}</span>
        <p>${esc(en.text)}</p>
      </button>`).join('');
    return {
      text:'', deletable:false, title:'',
      meta:`${fmtDay(s.date)} · ${list.length} ${list.length === 1 ? 'ENTRY' : 'ENTRIES'}`,
      echoHtml,
    };
  }
  if (s.kind === 'diaryEntry') {
    const en = state.diary.find(x=>x.id===s.id);
    if (!en) return null;
    return { text:en.text, deletable:true, meta:`${fmtDay(en.date)} · ${en.time}`, title:'' };
  }
  return null;
}

function echoCardHtml(p){
  return `
    <div class="echo-card">
      <span class="echo-meta">${esc(typesText(p))}${p.types.length?' · ':''}${esc(p.time)}</span>
      <h4>${esc(p.title)}</h4>
      <p>${esc(p.text)}</p>
    </div>`;
}

function renderPointForm(){
  const s = state.sheet;
  const d = s?.draft || { title:'', types:[], stars:3 };
  $('#pfTitle').value = d.title;
  $('#pfChips').innerHTML = EMOTIONS.map(e=>`<button class="tap ${d.types.includes(e)?'on':''}" data-emo="${esc(e)}">${esc(e)}</button>`).join('<i class="pf-sep"></i>');
  $('#pfStars').innerHTML = [1,2,3,4,5].map(n=>`
    <button class="tap ${n<=d.stars?'on':''}" data-pf-star="${n}">${n<=d.stars?'★':'☆'}</button>
  `).join('');
}

function renderSheet(){
  const s = state.sheet;
  const d = getSheetData();
  if (!s || !d) return;

  // 右上 × 始终可见；编辑态取消/保存在内容流底部的编辑行
  $('#sheetClose').hidden = false;

  // Meta：记忆点编辑态下隐藏（改由表单承载）
  // 记忆线的 meta 随内容滚动；其余固定在标题上方
  const metaFixed = $('#sheetMeta');
  const metaScroll = $('#sheetMetaScroll');
  const showMeta = d.meta && !(s.editing && s.kind === 'point');
  metaFixed.hidden = true;
  metaScroll.hidden = true;
  metaFixed.textContent = '';
  metaScroll.textContent = '';   // 清掉上次弹窗残留，防串场
  if (showMeta) {
    if (s.kind === 'line' || s.kind === 'diaryDay') { metaScroll.textContent = d.meta; metaScroll.hidden = false; }
    else { metaFixed.textContent = d.meta; metaFixed.hidden = false; }
  }

  // Title (only used for point kind, and only in preview mode) —— 固定在滚动区上方
  const titleEl = $('#sheetTitle');
  const showTitle = d.title && !s.editing;
  titleEl.hidden = !showTitle;
  if (showTitle) titleEl.textContent = d.title;

  // Point edit form（顺序：情绪 → 重要度 → 标题 → 正文）
  const form = $('#pointForm');
  const showForm = s.editing && s.kind === 'point';
  form.hidden = !showForm;
  if (showForm) renderPointForm();

  // Preview / edit
  const preview = $('#sheetPreview');
  const editarea = $('#sheetEditarea');
  if (s.editing) {
    preview.hidden = true;
    editarea.hidden = false;
    editarea.value = d.text;
    editarea.placeholder = d.placeholder || '';
  } else {
    preview.hidden = false;
    editarea.hidden = true;
    preview.textContent = d.text || (d.placeholder || '');
  }

  // Echo：记忆线回显记忆点；当天日记回显条目列表（可点进单篇）
  const echoEl = $('#sheetEcho');
  if (d.echoHtml) {
    echoEl.innerHTML = d.echoHtml;
    echoEl.hidden = false;
  } else {
    echoEl.hidden = true;
    echoEl.innerHTML = '';
  }

  // Actions：编辑态与"当天日记"列表不展示操作键；从日历进入的单篇日记多一个 BACK
  const actions = $('#sheetActions');
  actions.innerHTML = (s.editing || s.kind === 'diaryDay') ? '' : `
    ${s.kind === 'diaryEntry' && s.from === 'day' ? '<button class="tap" data-act="back">BACK</button>' : ''}
    <button class="tap" data-act="copy">COPY</button>
    <button class="tap" data-act="edit">EDIT</button>
    ${d.deletable ? '<button class="tap danger" data-act="delete">DELETE</button>' : ''}
  `;

  // 编辑行（在内容流内，仅编辑态出现）
  $('#sheetEditRow').hidden = !s.editing;
}

// Sheet actions (event delegation)
$('#sheetActions').addEventListener('click', e=>{
  const btn = e.target.closest('[data-act]');
  if (!btn) return;
  const act = btn.dataset.act;
  const s = state.sheet;
  if (!s) return;

  if (act === 'back') {
    openSheet({ kind:'diaryDay', date: s.date });
  } else if (act === 'copy') {
    const d = getSheetData();
    if (!d) return;
    if (d.text) {
      copyToClipboard(d.text);
      showToast('已复制');
    }
  } else if (act === 'edit') {
    state.sheet.editing = true;
    initPointDraft();
    renderSheet();
    sheetScrollEl.scrollTop = 0;
    sheetGo('tall');                 // 编辑态直接展开到全高
    setTimeout(()=>{
      if (s.kind !== 'point') $('#sheetEditarea')?.focus();
    }, 340);
  } else if (act === 'delete') {
    const d = getSheetData();
    if (!d) return;
    let subtitle = d.title || d.text || '';
    subtitle = subtitle.replace(/\s+/g,' ').trim();
    if (subtitle.length > 44) subtitle = subtitle.slice(0, 44) + '…';
    const kindText = ({face:'这条人格核心', point:'这个记忆点', line:'这条记忆线', diaryEntry:'这篇日记'})[s.kind];
    openConfirm({
      q: `删除${kindText}？`,
      subtitle,
      onOk: () => {
        performSheetDelete();
        closeConfirm();
        // 从当天列表进入的日记：删除后回到当天列表（若已删空则关闭）
        if (s.kind === 'diaryEntry' && s.from === 'day' && diaryOn(s.date).length) {
          openSheet({ kind:'diaryDay', date: s.date });
        } else {
          closeSheet();
        }
        renderMain();
      }
    });
  }
});

// 编辑态 CANCEL：退出编辑（新建则直接关闭）
$('#sheetCancel').addEventListener('click', ()=>{
  const s = state.sheet;
  if (!s) return;
  if (s.isNew) { closeSheet(); return; }
  s.editing = false;
  renderSheet();
  sheetScrollEl.scrollTop = 0;
});

// 情绪标签 / 星级选择（事件委托）
$('#pfChips').addEventListener('click', e=>{
  const btn = e.target.closest('[data-emo]');
  const s = state.sheet;
  if (!btn || !s?.draft) return;
  const emo = btn.dataset.emo;
  const i = s.draft.types.indexOf(emo);
  if (i >= 0) s.draft.types.splice(i, 1);
  else {
    if (s.draft.types.length >= 3) { showToast('最多选3个情绪'); return; }
    s.draft.types.push(emo);
  }
  renderPointForm();
});
$('#pfStars').addEventListener('click', e=>{
  const btn = e.target.closest('[data-pf-star]');
  const s = state.sheet;
  if (!btn || !s?.draft) return;
  s.draft.stars = +btn.dataset.pfStar;
  renderPointForm();
});
$('#pfTitle').addEventListener('input', e=>{
  if (state.sheet?.draft) state.sheet.draft.title = e.target.value;
});

function performSheetDelete(){
  const s = state.sheet;
  if (!s) return;
  if (s.kind === 'face') state.faces = state.faces.filter(x=>x.id!==s.id);
  else if (s.kind === 'point') state.points = state.points.filter(x=>x.id!==s.id);
  else if (s.kind === 'diaryEntry') state.diary = state.diary.filter(x=>x.id!==s.id);
  else if (s.kind === 'line') {
    if (s.group === 'recent') state.recent = state.recent.filter(x=>x.id!==s.id);
    else state.core = state.core.filter(x=>x.id!==s.id);
  }
}

$('#sheetClose').addEventListener('click', closeSheet);
// 当天日记列表 → 单篇日记（事件委托）
$('#sheetEcho').addEventListener('click', e=>{
  const btn = e.target.closest('[data-diary-id]');
  if (!btn) return;
  const s = state.sheet;
  openSheet({ kind:'diaryEntry', id: btn.dataset.diaryId, from:'day', date: s?.date });
});
$('#sheetWrap').addEventListener('click', e=>{
  if (e.target === $('#sheetWrap')) closeSheet();
});

$('#sheetSaveBtn').addEventListener('click', ()=>{
  const s = state.sheet;
  if (!s) return;
  const v = $('#sheetEditarea').value.trim();
  if (!v) { showToast('内容不能为空'); return; }

  if (s.kind === 'face') {
    if (s.isNew) {
      const id = 'f' + Date.now();
      state.faces.push({ id, text:v });
      s.id = id;
    } else {
      const f = state.faces.find(x=>x.id===s.id);
      if (f) f.text = v;
    }
  } else if (s.kind === 'point') {
    const draft = s.draft || { title:'', types:[], stars:3 };
    const title = ($('#pfTitle').value || '').trim() || '（次日自动生成）';
    if (s.isNew) {
      const id = 'p' + Date.now();
      const now = new Date();
      state.points.unshift({
        id,
        title,
        d:`${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`,
        time:`${MONTHS[now.getMonth()]} ${pad2(now.getDate())} · ${pad2(now.getHours())}:${pad2(now.getMinutes())}`,
        stars: draft.stars,
        types: [...draft.types],
        text: v
      });
      s.id = id;
    } else {
      const p = state.points.find(x=>x.id===s.id);
      if (p) {
        p.text = v;
        p.title = title;
        p.stars = draft.stars;
        p.types = [...draft.types];
      }
    }
  } else if (s.kind === 'line') {
    const list = s.group === 'recent' ? state.recent : state.core;
    const l = list.find(x=>x.id===s.id);
    if (l) l.title = v;
  } else if (s.kind === 'diaryEntry') {
    const en = state.diary.find(x=>x.id===s.id);
    if (en) en.text = v;
  }

  // 保存后回到当前弹窗的回显态，弹窗保留
  s.isNew = false;
  s.editing = false;
  renderMain();
  renderSheet();
  sheetScrollEl.scrollTop = 0;
  showToast('已保存');
});

/* ================= Confirm ================= */
function openConfirm(cfg){
  lockBody();
  state.confirm = cfg;
  $('#confirmQ').textContent = cfg.q || '删除这条内容？';
  $('#confirmT').textContent = cfg.subtitle || '';
  $('#confirmT').hidden = !cfg.subtitle;
  $('#confirmWrap').classList.add('on');
}
function closeConfirm(){
  if (state.confirm) unlockBody();
  state.confirm = null;
  $('#confirmWrap').classList.remove('on');
}
$('#confirmCancel').addEventListener('click', closeConfirm);
$('#confirmOk').addEventListener('click', ()=>{
  const c = state.confirm;
  if (c?.onOk) c.onOk();
  else closeConfirm();
});
$('#confirmWrap').addEventListener('click', e=>{
  if (e.target === $('#confirmWrap')) closeConfirm();
});

/* ================= Calendar picker ================= */
function openCalendar(){
  const f = state.filter;
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  if (f.dateMode === 'range' && f.start) {
    const [sy, sm] = f.start.split('-');
    y = +sy; m = +sm - 1;
  }
  state.cal = {
    y, m,
    start: f.dateMode === 'range' ? f.start : null,
    end:   f.dateMode === 'range' ? f.end   : null,
    mode:  f.dateMode,
  };
  lockBody();
  renderCalendar();
  $('#calWrap').classList.add('on');
}
function closeCalendar(){
  if (state.cal) unlockBody();
  state.cal = null;
  $('#calWrap').classList.remove('on');
}
function renderCalendar(){
  const c = state.cal;
  if (!c) return;
  $('#calTitle').textContent = `${MONTHS[c.m]} ${c.y}`;
  const first = new Date(c.y, c.m, 1).getDay();
  const days = new Date(c.y, c.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < first; i++) cells.push('<i></i>');
  for (let d = 1; d <= days; d++) {
    const iso = `${c.y}-${pad2(c.m+1)}-${pad2(d)}`;
    const isEdge = iso === c.start || iso === c.end;
    const inRange = c.start && c.end && iso > c.start && iso < c.end;
    cells.push(`<button class="tap ${isEdge?'edge':''} ${inRange?'in':''}" data-day="${iso}">${d}</button>`);
  }
  $('#calGrid').innerHTML = cells.join('');
  $$('.cal-presets button').forEach(b=>{
    b.classList.toggle('on', !c.start && c.mode === b.dataset.preset);
  });
  $$('#calGrid [data-day]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const iso = b.dataset.day;
      if (!c.start || (c.start && c.end)) { c.start = iso; c.end = null; }
      else if (iso >= c.start) { c.end = iso; }
      else { c.start = iso; c.end = null; }
      c.mode = 'range';
      renderCalendar();
    });
  });
}
$('#calPrev').addEventListener('click', ()=>{
  const c = state.cal; if (!c) return;
  c.m--; if (c.m < 0) { c.m = 11; c.y--; }
  renderCalendar();
});
$('#calNext').addEventListener('click', ()=>{
  const c = state.cal; if (!c) return;
  c.m++; if (c.m > 11) { c.m = 0; c.y++; }
  renderCalendar();
});
$$('.cal-presets button').forEach(b=>{
  b.addEventListener('click', ()=>{
    const c = state.cal; if (!c) return;
    c.mode = b.dataset.preset;   // 'month' | 'all'
    c.start = null; c.end = null;
    renderCalendar();
  });
});
$('#calCancel').addEventListener('click', closeCalendar);
$('#calSave').addEventListener('click', ()=>{
  const c = state.cal; if (!c) return;
  const f = state.filter;
  if (c.start) {
    f.dateMode = 'range';
    f.start = c.start;
    f.end = c.end || c.start;
  } else {
    f.dateMode = c.mode === 'all' ? 'all' : 'month';
    f.start = f.end = null;
  }
  closeCalendar();
  renderMain();
});
$('#calWrap').addEventListener('click', e=>{
  if (e.target === $('#calWrap')) closeCalendar();
});

/* ================= Boot ================= */
renderMain();

/* Prevent overscroll bounce on iOS while sheets are open */
document.addEventListener('touchmove', e=>{
  const sheetOpen = $('#sheetWrap').classList.contains('on') ||
                    $('#confirmWrap').classList.contains('on') ||
                    $('#calWrap').classList.contains('on');
  if (sheetOpen && e.target.closest('.sheet, .confirm-sheet, .cal-sheet') === null) {
    e.preventDefault();
  }
}, {passive:false});
</script>
